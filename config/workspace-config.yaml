# Fabric Workspace Git Integration Configuration
# This file defines workspace-to-repository mappings for automated deployment

# Azure Configuration
azure:
  resource_group: "westusattendiesdata"
  location: "westus"
  storage_account: "westusattendiesstore"
  blob_container: "conference-data"

# Fabric Configuration
fabric:
  capacity_name: "akhfabcapacity"
  capacity_id: "AC94517C-39AF-425B-A2FE-1E7D72A8C06D"  # Optional: auto-discovered if not provided

# Workspace Definitions
# Each workspace can have its own Git repository and configuration
workspaces:
  # West US Training workspace
  - name: "West US Training"
    description: "Conference attendance data pipeline - West US region"
    enabled: true  # Set to false to skip this workspace during deployment
    data_file: "west_us_attendance.csv"  # Specific CSV for this workspace
    
    # Git Integration
    git:
      provider: "GitHub"  # GitHub or AzureDevOps
      organization: "KeykPa"
      repository: "FabricPipelineAutomation"
      branch: "main"
      directory: "/"  # Root directory
    
    # Lakehouse Configuration
    lakehouse:
      name: "ConferenceDataLakehouse"
    
    # Artifacts to verify after Git sync
    expected_artifacts:
      - type: "Notebook"
        name: "Load Conference Data"
      - type: "SemanticModel"
        name: "ConferenceAttendanceSemanticModel"
      - type: "Report"
        name: "AttendanceReport"
    
    # Power BI Report
    powerbi:
      semantic_model: "ConferenceAttendanceSemanticModel"
      report_name: "WestUSAttendanceReport"

  # East US Training workspace
  - name: "East US Training"
    description: "Conference attendance data pipeline - East US region"
    enabled: true  # Enabled for multi-workspace deployment
    data_file: "east_us_attendance.csv"  # Specific CSV for this workspace
    
    git:
      provider: "GitHub"
      organization: "KeykPa"
      repository: "FabricPipelineAutomation"
      branch: "main"
      directory: "/"
    
    lakehouse:
      name: "ConferenceDataLakehouse"
    
    expected_artifacts:
      - type: "Notebook"
        name: "Load Conference Data"
      - type: "SemanticModel"
        name: "ConferenceAttendanceSemanticModel"
      - type: "Report"
        name: "AttendanceReport"
    
    powerbi:
      semantic_model: "ConferenceAttendanceSemanticModel"
      report_name: "EastUSAttendanceReport"

  # Central US Training workspace
  - name: "Central US Training"
    description: "Conference attendance data pipeline - Central US region"
    enabled: true  # Enabled for multi-workspace deployment
    data_file: "central_us_attendance.csv"  # Specific CSV for this workspace
    
    git:
      provider: "GitHub"
      organization: "KeykPa"
      repository: "FabricPipelineAutomation"
      branch: "main"
      directory: "/"
    
    lakehouse:
      name: "ConferenceDataLakehouse"
    
    expected_artifacts:
      - type: "Notebook"
        name: "Load Conference Data"
      - type: "SemanticModel"
        name: "ConferenceAttendanceSemanticModel"
      - type: "Report"
        name: "AttendanceReport"
    
    powerbi:
      semantic_model: "ConferenceAttendanceSemanticModel"
      report_name: "CentralUSAttendanceReport"

# Deployment Options
deployment:
  # Create only workspaces that don't exist (true) or fail if workspace exists (false)
  skip_existing_workspaces: true
  
  # Wait time after workspace creation before assigning capacity (seconds)
  workspace_creation_wait: 5
  
  # Wait time after Git sync before verification (seconds)
  git_sync_wait: 45
  
  # Automatically open browser for each workspace Git configuration
  auto_open_browser: true
  
  # Create Lakehouse automatically
  auto_create_lakehouse: true
  
  # Upload individual CSV files to OneLake for each workspace
  auto_upload_data: true
  
  # Run notebooks after deployment
  auto_run_notebooks: false
  
  # Create Power BI reports automatically
  auto_create_reports: false

# Logging and Reporting
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/deployment.log"
  console_colors: true
